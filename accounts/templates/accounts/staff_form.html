<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% if staff_user %}Edit Staff{% else %}Add Staff{% endif %}</title>
</head>
<body>
    <h1>{% if staff_user %}Edit {{ staff_user.username }}{% else %}Add Staff{% endif %}</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>

    <br>
    <a href="{% url 'accounts:settings_dashboard' %}">Cancel and Return to Dashboard</a>
</body>
</html>
