<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Confirm Delete</title>
</head>
<body>
    <h1>Confirm Delete</h1>
    <p>Are you sure you want to delete "{{ object }}"?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, I'm sure</button>
    </form>

    <br>
    <a href="{% url 'accounts:settings_dashboard' %}">Cancel</a>
</body>
</html>
