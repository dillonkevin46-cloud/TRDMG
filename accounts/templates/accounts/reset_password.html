<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
</head>
<body>
    <h1>Reset Password for {{ staff_user.username }}</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Reset Password</button>
    </form>

    <br>
    <a href="{% url 'accounts:settings_dashboard' %}">Cancel and Return to Dashboard</a>
</body>
</html>
