<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% if department %}Edit Department{% else %}Add Department{% endif %}</title>
</head>
<body>
    <h1>{% if department %}Edit {{ department.name }}{% else %}Add Department{% endif %}</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>

    <br>
    <a href="{% url 'accounts:settings_dashboard' %}">Cancel and Return to Dashboard</a>
</body>
</html>
