<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradecore - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen px-4">

    <div class="bg-white p-8 sm:p-10 rounded-2xl shadow-sm border border-slate-200 w-full max-w-md">
        
        <div class="flex flex-col items-center justify-center gap-3 mb-8">
            <div class="w-12 h-12 rounded-xl bg-indigo-600 flex items-center justify-center text-white font-bold text-3xl shadow-sm">
                T
            </div>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Tradecore</h1>
        </div>

        <h2 class="text-lg font-semibold text-slate-700 mb-6 text-center">Log in to your workspace</h2>

        <form method="post" class="space-y-5">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="p-3 rounded-lg bg-red-50 border border-red-100 text-sm text-red-600 text-center font-medium">
                    Your username and password didn't match. Please try again.
                </div>
            {% endif %}

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5" for="id_username">Username</label>
                <input type="text" name="username" id="id_username" class="w-full rounded-lg border-slate-300 border p-3 text-slate-900 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 sm:text-sm transition-colors outline-none" required autofocus>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5" for="id_password">Password</label>
                <input type="password" name="password" id="id_password" class="w-full rounded-lg border-slate-300 border p-3 text-slate-900 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 sm:text-sm transition-colors outline-none" required>
            </div>

            <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors mt-4">
                Log In
            </button>
        </form>

    </div>

</body>
</html>
